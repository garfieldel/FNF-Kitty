name: build
on: [push]

jobs:
  main:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.2.5

      # 🔥 INSTALA ANDROID SDK (arregla sdkmanager)
      - name: setup ndk
        uses: nttld/setup-ndk@main
        id: setup-ndk
        with:
          ndk-version: r21e
          local-cache: true
      
      - name: install haxelib dependencies
        run: |
          haxelib install lime 7.9.0
          haxelib install openfl 9.1.0
          haxelib install flixel 4.11.0
          haxelib install flixel-ui 2.6.1
          haxelib install flixel-addons 2.11.0
          haxelib install hscript 2.5.0
          haxelib install polymod 1.5.2
          haxelib install linc_luajit 0.0.7
          haxelib install actuate 1.9.0
          haxelib install hxcpp
          haxelib git faxe https://github.com/uhrobots/faxe
          haxelib git discord_rpc https://github.com/Aidan63/linc_discord-rpc
          haxelib git extension-webm https://github.com/brusakas/extension-webm

      # 🔥 INSTALA NDK CORRECTO (evita error typeinfo)
      - name: compile mobile
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME_17_X64
          haxelib run lime config ANDROID_SETUP true
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
      # 🚀 COMPILAR APK
      - name: build
        run: |
          haxelib run lime build android

      # 📦 SUBIR APK
      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: export/release/android/bin/app/build/outputs/apk/debug
